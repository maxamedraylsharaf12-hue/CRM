<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI profiler screenshot">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="24"/>
  <rect x="56" y="40" width="688" height="134" rx="16" fill="url(#card)"/>
  <rect x="120" y="64" width="560" height="38" rx="10" fill="#111827" opacity="0.05"/>
  <rect x="120" y="110" width="520" height="56" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="142" y="88" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Advanced AI Suspect Profiler</text>
  <text x="142" y="108" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Utilize neural networks to analyze behavior patterns and investigative leads</text>
  <rect x="268" y="146" width="264" height="32" rx="10" fill="url(#blue)"/>
  <text x="400" y="168" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Run Profile Analysis</text>
  <rect x="56" y="200" width="688" height="146" rx="16" fill="url(#card)"/>
  <text x="80" y="232" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Pattern Matching</text>
  <text x="80" y="252" font-family="system-ui, sans-serif" font-size="10" fill="#475569">The system automatically scans descriptions against national database aliases and cold case patterns.</text>
  <text x="400" y="232" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Predictive Risk</text>
  <text x="400" y="252" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Estimates escalation likelihood based on reported behaviors and historical recidivism data.</text>
  <circle cx="740" cy="90" r="28" fill="#2563eb" opacity="0.35"/>
  <path d="M728 86l8 12 12-18" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
